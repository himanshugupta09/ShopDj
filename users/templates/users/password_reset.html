{% extends 'store/base.html' %}
{% block title %}Forgot Password - ShopDjango{% endblock %}

{% block content %}
<div style="max-width:400px; margin:60px auto; background:white; padding:32px; border-radius:8px;">
    <h2 style="margin-bottom:8px;">🔑 Forgot Password</h2>
    <p style="color:#888; margin-bottom:24px;">Enter your email and we'll send you a reset link.</p>

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:16px;">
            <label style="display:block; margin-bottom:4px; font-weight:bold;">Email Address</label>
            <input type="email" name="email" required
                   style="width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:4px; font-size:14px;"
                   placeholder="your@email.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:12px;">
            Send Reset Link 📧
        </button>
    </form>

    <p style="text-align:center; margin-top:16px;">
        <a href="{% url 'login' %}" style="color:#2874f0;">← Back to Login</a>
    </p>
</div>
{% endblock %}
