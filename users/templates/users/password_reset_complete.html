{% extends 'store/base.html' %}
{% block title %}Password Reset Complete - ShopDjango{% endblock %}

{% block content %}
<div style="max-width:400px; margin:60px auto; background:white; padding:32px; border-radius:8px; text-align:center;">
    <p style="font-size:48px;">✅</p>
    <h2>Password Reset!</h2>
    <p style="color:#888; margin:16px 0;">
        Your password has been successfully reset.
        You can now login with your new password.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary" style="display:inline-block; margin-top:8px;">
        Login Now →
    </a>
</div>
{% endblock %}
