{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopDjango{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'store/css/style.css' %}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="{% url 'home' %}" class="logo">🛒 ShopDjango</a>

    <!-- Search Bar -->
    <form class="search-bar" method="GET" action="{% url 'product_list' %}">
        <input type="text" name="q" placeholder="Search products..." value="{{ request.GET.q }}">
        <button type="submit">Search</button>
    </form>

    <!-- Nav Links -->
    <div>
        <a href="{% url 'product_list' %}" style="margin-right:16px;">Products</a>
        <a href="{% url 'cart' %}" style="margin-right:16px;">🛒 Cart</a>
        <a href="/users/login/">Login</a>
    </div>
</nav>

<!-- MAIN CONTENT -->
<main>
    {% block content %}
    <!-- Each page fills this block -->
    {% endblock %}
</main>

<footer>
    <p>© 2025 ShopDjango — Built with Django 🐍</p>
</footer>

</body>
</html>
